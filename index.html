<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Franceză AI">
<meta name="description" content="Învață franceza cu Gemma 4 AI - gratuit">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Professeur Gemma 🇫🇷</title>
<style>
:root {
  --bg: #0f0f0e;
  --surface: #1a1a18;
  --surface2: #222220;
  --surface3: #2c2c28;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0ede6;
  --text2: #9a9790;
  --text3: #5a5855;
  --blue: #4a9eff;
  --green: #4caf7d;
  --accent: #e8e4dc;
  --red: #ff5f5f;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
.app { display: flex; flex-direction: column; height: 100dvh; max-width: 600px; margin: 0 auto; }

.header {
  padding: calc(10px + var(--safe-top)) 16px 10px;
  background: var(--surface); border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.flag-circle { width: 40px; height: 40px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 20px; border: 0.5px solid var(--border2); flex-shrink: 0; }
.header-text { flex: 1; }
.header-title { font-size: 15px; font-weight: 600; color: var(--text); }
.header-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #f0a030; flex-shrink: 0; transition: background 0.3s; }
.status-dot.online { background: var(--green); }
.speaking-badge { display: none; padding: 4px 10px; background: rgba(76,175,125,0.12); border: 0.5px solid rgba(76,175,125,0.3); border-radius: 8px; font-size: 12px; color: var(--green); flex-shrink: 0; }
.speaking-badge.show { display: flex; align-items: center; gap: 6px; }
.speak-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 0.8s infinite; }
@keyframes blink { 0%,100%{opacity:.3}50%{opacity:1} }

.key-bar { padding: 8px 14px; background: var(--surface); border-bottom: 0.5px solid var(--border); display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.key-bar label { font-size: 11px; color: var(--text2); white-space: nowrap; }
.key-bar input { flex: 1; padding: 7px 10px; font-size: 12px; font-family: 'Courier New', monospace; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 8px; color: var(--text); outline: none; min-width: 0; }
.key-bar input:focus { border-color: var(--blue); }
.key-bar a { font-size: 11px; color: var(--blue); text-decoration: none; white-space: nowrap; }

.modes { display: flex; gap: 5px; padding: 8px 14px; overflow-x: auto; flex-shrink: 0; background: var(--surface); border-bottom: 0.5px solid var(--border); scrollbar-width: none; }
.modes::-webkit-scrollbar { display: none; }
.mode-btn { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--border2); cursor: pointer; white-space: nowrap; color: var(--text2); background: transparent; font-family: inherit; transition: all 0.15s; }
.mode-btn.active { background: var(--accent); color: #1a1a18; border-color: var(--accent); font-weight: 500; }

.messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; overscroll-behavior: contain; }
.msg { display: flex; gap: 8px; align-items: flex-end; }
.msg.user { flex-direction: row-reverse; }
.avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--surface2); border: 0.5px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.bubble { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
.msg.ai .bubble { background: var(--surface2); color: var(--text); border: 0.5px solid var(--border); border-bottom-left-radius: 4px; }
.msg.user .bubble { background: var(--surface3); color: var(--text); border: 0.5px solid var(--border2); border-bottom-right-radius: 4px; }
.tts-row { margin-top: 5px; display: flex; gap: 8px; }
.tts-btn { font-size: 11px; color: var(--text3); cursor: pointer; background: none; border: none; font-family: inherit; padding: 0; }
.tts-btn:hover { color: var(--text2); }

.typing { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); animation: pulse 1.2s infinite; }
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes pulse { 0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)} }

.voice-status { display: none; padding: 8px 16px; background: var(--surface); border-top: 0.5px solid var(--border); flex-shrink: 0; align-items: center; gap: 10px; }
.voice-status.show { display: flex; }
.voice-wave { display: flex; gap: 3px; align-items: center; }
.wave-bar { width: 3px; background: var(--red); border-radius: 2px; animation: wave .6s ease-in-out infinite alternate; }
.wave-bar:nth-child(1){height:8px;animation-delay:0s}
.wave-bar:nth-child(2){height:16px;animation-delay:.1s}
.wave-bar:nth-child(3){height:12px;animation-delay:.2s}
.wave-bar:nth-child(4){height:20px;animation-delay:.15s}
.wave-bar:nth-child(5){height:10px;animation-delay:.05s}
@keyframes wave { from{transform:scaleY(.4)} to{transform:scaleY(1.2)} }
.voice-status-text { flex: 1; font-size: 13px; color: var(--text2); }
.stop-voice { font-size: 12px; color: var(--red); cursor: pointer; background: none; border: 0.5px solid rgba(255,95,95,.3); padding: 4px 10px; border-radius: 8px; font-family: inherit; }

.suggestions { display: flex; gap: 6px; padding: 6px 14px 2px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
.suggestions::-webkit-scrollbar { display: none; }
.sug { font-size: 12px; padding: 5px 11px; border: 0.5px solid var(--border2); border-radius: 14px; cursor: pointer; white-space: nowrap; color: var(--text2); background: var(--surface2); font-family: inherit; flex-shrink: 0; }
.sug:active { background: var(--surface3); }

.input-area { padding: 10px 14px calc(10px + var(--safe-bottom)); background: var(--surface); border-top: 0.5px solid var(--border); display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
.text-input { flex: 1; padding: 10px 14px; font-size: 15px; font-family: inherit; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 22px; color: var(--text); outline: none; resize: none; max-height: 100px; overflow-y: auto; line-height: 1.4; }
.text-input::placeholder { color: var(--text3); }
.icon-btn { width: 42px; height: 42px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; cursor: pointer; transition: all .15s; }
.icon-btn:active { transform: scale(.9); }
.icon-btn:disabled { opacity: .3; }
.mic-btn { background: var(--surface3); color: var(--text); }
.mic-btn.recording { background: var(--red); color: #fff; animation: pulse-btn 1s infinite; }
@keyframes pulse-btn { 0%,100%{box-shadow:0 0 0 0 rgba(255,95,95,.4)}50%{box-shadow:0 0 0 8px rgba(255,95,95,0)} }
.send-btn { background: var(--accent); color: #1a1a18; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="flag-circle">🇫🇷</div>
    <div class="header-text">
      <div class="header-title">Professeur Gemma</div>
      <div class="header-sub">Gemma 4 31B · voce activată</div>
    </div>
    <div class="speaking-badge" id="speakingBadge"><div class="speak-dot"></div> Vorbesc...</div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <div class="key-bar">
    <label>API Key:</label>
    <input type="password" id="keyInput" placeholder="sk-or-v1-... (OpenRouter)" autocomplete="off" />
    <a href="https://openrouter.ai/keys" target="_blank">Obține gratis</a>
  </div>

  <div class="modes">
    <button class="mode-btn active" data-mode="conversation">💬 Conversație</button>
    <button class="mode-btn" data-mode="vocabulary">📚 Vocabular</button>
    <button class="mode-btn" data-mode="grammar">✏️ Gramatică</button>
    <button class="mode-btn" data-mode="exercise">🧠 Exerciții</button>
    <button class="mode-btn" data-mode="translate">🔄 Traducere</button>
  </div>

  <div class="messages" id="msgs"></div>

  <div class="voice-status" id="voiceStatus">
    <div class="voice-wave">
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    <div class="voice-status-text" id="voiceStatusText">Ascult...</div>
    <button class="stop-voice" id="stopVoice">Oprește</button>
  </div>

  <div class="suggestions" id="suggestions"></div>

  <div class="input-area">
    <button class="icon-btn mic-btn" id="micBtn">🎤</button>
    <textarea class="text-input" id="inp" placeholder="Scrie sau apasă 🎤 pentru a vorbi..." rows="1"></textarea>
    <button class="icon-btn send-btn" id="sendBtn">➤</button>
  </div>
</div>

<script>
// Register service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

const MODE_PROMPTS = {
  conversation: `Ești "Professeur Gemma", profesor simpatic de franceză pentru vorbitori de română. Răspunsuri SCURTE (2-4 propoziții) — ești citit cu voce tare.
- Utilizatorul vorbește/scrie în română → răspunde în română cu câteva cuvinte cheie în franceză
- Utilizatorul vorbește/scrie în franceză → răspunde în franceză, corectează blând
- Fii cald și concis.`,
  vocabulary: `Profesor de vocabular francez pentru vorbitori de română. Răspunsuri scurte (voce). Dă 4-5 cuvinte: cuvânt = traducere → exemplu scurt.`,
  grammar: `Profesor de gramatică franceză. Explică regula în 2-3 propoziții clare, cu un exemplu. Concis — citit cu voce tare.`,
  exercise: `Profesor de franceză care face exerciții. Un singur exercițiu scurt per mesaj. Corectează răspunsul. Răspunsuri scurte.`,
  translate: `Translator franceză-română. Traducere + scurtă explicație (1-2 propoziții). Concis.`
};

const SUGGESTIONS = {
  conversation: ['Cum mă prezint?', 'La restaurant', 'La gară', 'Vreau să exersez'],
  vocabulary: ['Familie', 'Mâncare', 'Culori', 'Numere 1-20'],
  grammar: ['Verbul être', 'Pluralul', 'Negația', 'Articolele'],
  exercise: ['Completare spații', 'Conjugare', 'Traducere rapidă'],
  translate: ['Bună ziua, cum ești?', 'Cât costă?', 'Nu înțeleg', 'Unde e gara?']
};

let currentMode = 'conversation', history = [], isLoading = false;
let recognition = null, isRecording = false;

const msgs = document.getElementById('msgs');
const inp = document.getElementById('inp');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const keyInput = document.getElementById('keyInput');
const statusDot = document.getElementById('statusDot');
const voiceStatus = document.getElementById('voiceStatus');
const voiceStatusText = document.getElementById('voiceStatusText');
const speakingBadge = document.getElementById('speakingBadge');
const suggestionsEl = document.getElementById('suggestions');

const savedKey = localStorage.getItem('or_api_key');
if (savedKey) { keyInput.value = savedKey; statusDot.classList.add('online'); }
keyInput.addEventListener('input', () => {
  const k = keyInput.value.trim();
  if (k.length > 10) { localStorage.setItem('or_api_key', k); statusDot.classList.add('online'); }
  else { localStorage.removeItem('or_api_key'); statusDot.classList.remove('online'); }
});

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const clean = text.replace(/[^\w\s,.!?'àâäéèêëîïôùûüçœæÀÂÄÉÈÊËÎÏÔÙÛÜÇŒÆăîșțĂÎȘȚ0-9-]/g, ' ').trim();
  if (!clean) return;
  const utt = new SpeechSynthesisUtterance(clean);
  const frScore = (clean.match(/\b(je|tu|il|elle|nous|vous|ils|elles|le|la|les|un|une|des|est|sont|être|avoir|bonjour|merci|oui|non|mais|avec|dans|pour|sur|par|qui|que)\b/gi) || []).length;
  utt.lang = frScore >= 3 ? 'fr-FR' : 'ro-RO';
  utt.rate = 0.88; utt.pitch = 1.05;
  const voices = window.speechSynthesis.getVoices();
  const pref = utt.lang.split('-')[0];
  const v = voices.find(v => v.lang === utt.lang && v.localService) || voices.find(v => v.lang.startsWith(pref) && v.localService) || voices.find(v => v.lang.startsWith(pref));
  if (v) utt.voice = v;
  utt.onstart = () => speakingBadge.classList.add('show');
  utt.onend = utt.onerror = () => speakingBadge.classList.remove('show');
  window.speechSynthesis.speak(utt);
}

function stopSpeaking() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  speakingBadge.classList.remove('show');
}

function startRecording() {
  if (isRecording) { stopRecording(); return; }
  stopSpeaking();
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { addMsg('ai', '⚠️ Folosește Google Chrome pe Android pentru funcția vocală.'); return; }
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'ro-RO';
  recognition.onstart = () => {
    isRecording = true;
    micBtn.classList.add('recording'); micBtn.textContent = '⏹';
    voiceStatus.classList.add('show'); voiceStatusText.textContent = 'Ascult... vorbește acum';
  };
  recognition.onresult = (e) => {
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    const txt = final || interim;
    inp.value = txt;
    voiceStatusText.textContent = '"' + txt + '"';
    if (final) { stopRecording(); setTimeout(sendMsg, 300); }
  };
  recognition.onerror = (e) => {
    stopRecording();
    if (e.error !== 'aborted' && e.error !== 'no-speech') addMsg('ai', '⚠️ Eroare microfon: ' + e.error);
  };
  recognition.onend = () => stopRecording();
  try { recognition.start(); } catch(e) {}
}

function stopRecording() {
  isRecording = false;
  micBtn.classList.remove('recording'); micBtn.textContent = '🎤';
  voiceStatus.classList.remove('show');
  if (recognition) { try { recognition.stop(); } catch(e){} }
}

micBtn.addEventListener('click', startRecording);
document.getElementById('stopVoice').addEventListener('click', stopRecording);

function addMsg(role, text, isTyping) {
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = role === 'user' ? '👤' : '🎓';
  const wrap = document.createElement('div');
  const b = document.createElement('div');
  b.className = 'bubble';
  if (isTyping) {
    b.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    div.id = 'typingMsg';
  } else {
    b.textContent = text;
  }
  wrap.appendChild(b);
  if (role === 'ai' && !isTyping) {
    const row = document.createElement('div');
    row.className = 'tts-row';
    const btn1 = document.createElement('button');
    btn1.className = 'tts-btn'; btn1.textContent = '🔊 Ascultă din nou';
    btn1.onclick = () => speak(text);
    const btn2 = document.createElement('button');
    btn2.className = 'tts-btn'; btn2.textContent = '⏹ Oprește';
    btn2.onclick = stopSpeaking;
    row.appendChild(btn1); row.appendChild(btn2);
    wrap.appendChild(row);
  }
  if (role === 'user') { div.appendChild(wrap); div.appendChild(av); }
  else { div.appendChild(av); div.appendChild(wrap); }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typingMsg'); if (t) t.remove(); }

async function sendMsg() {
  const text = inp.value.trim();
  if (!text || isLoading) return;
  const apiKey = keyInput.value.trim() || localStorage.getItem('or_api_key') || '';
  if (!apiKey) {
    addMsg('ai', '⚠️ Introduce API key-ul OpenRouter mai sus.\nopenrouter.ai/keys → gratuit.');
    speak('Te rog introdu API key-ul OpenRouter.'); return;
  }
  inp.value = ''; inp.style.height = 'auto';
  isLoading = true; sendBtn.disabled = true;
  stopSpeaking();
  addMsg('user', text);
  history.push({ role: 'user', content: text });
  addMsg('ai', '', true);
  try {
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey, 'HTTP-Referer': 'https://claude.ai', 'X-Title': 'Professeur Gemma Voice' },
      body: JSON.stringify({ model: 'google/gemma-4-31b-it:free', max_tokens: 600, messages: [{ role: 'system', content: MODE_PROMPTS[currentMode] }, ...history] })
    });
    const data = await res.json();
    removeTyping();
    if (data.error) {
      const e = '❌ ' + (data.error.message || 'Eroare API');
      addMsg('ai', e); speak('A apărut o eroare. Verifică API key-ul.');
    } else {
      const reply = data.choices?.[0]?.message?.content || 'Răspuns gol.';
      history.push({ role: 'assistant', content: reply });
      addMsg('ai', reply); speak(reply);
    }
  } catch(e) {
    removeTyping();
    addMsg('ai', '❌ Eroare rețea: ' + e.message);
    speak('Eroare de conexiune.');
  }
  isLoading = false; sendBtn.disabled = false;
}

inp.addEventListener('input', () => { inp.style.height = 'auto'; inp.style.height = Math.min(inp.scrollHeight, 100) + 'px'; });
inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });
sendBtn.addEventListener('click', sendMsg);

function renderSuggestions() {
  suggestionsEl.innerHTML = '';
  (SUGGESTIONS[currentMode] || []).forEach(s => {
    const b = document.createElement('button');
    b.className = 'sug'; b.textContent = s;
    b.addEventListener('click', () => { inp.value = s; sendMsg(); });
    suggestionsEl.appendChild(b);
  });
}

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    history = []; msgs.innerHTML = '';
    stopSpeaking(); renderSuggestions();
    const names = { conversation:'Conversație', vocabulary:'Vocabular', grammar:'Gramatică', exercise:'Exerciții', translate:'Traducere' };
    const m = 'Modul "' + names[currentMode] + '" activat. Cu ce te ajut?';
    addMsg('ai', m); speak(m);
  });
});

renderSuggestions();
const welcome = `Bonjour! 👋 Sunt Professeur Gemma.

🎤 Apasă microfonul și vorbește
🔊 Îți răspund cu voce automată
⌨️  Sau scrie direct în căsuță

Pași rapizi:
1. openrouter.ai/keys → key gratuit
2. Lipește key-ul sus
3. Commençons!`;
addMsg('ai', welcome);
setTimeout(() => speak('Bonjour! Apasă microfonul și vorbim franceză împreună!'), 1000);
</script>
</body>
</html>
